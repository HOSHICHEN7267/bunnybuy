name: Backend Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          cd backend
          npm install
          npm run build
      # ✅ 這裡可以加部署到伺服器、Docker、Cloud Run、Fly.io 等的指令
