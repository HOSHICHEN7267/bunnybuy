name: Backend CI

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - develop
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20  # ✅ 注意！你的 NestJS 最好用 Node 20
      - run: |
          cd backend
          npm install
          npm run build
